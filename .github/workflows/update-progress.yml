name: Auto Update Progress Badge

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Calculate Progress Matrix
        id: calc
        run: |
          # 1. Overall Progress
          TOTAL_COMPLETED=$(find . -path "./Week*/Day*/notes.md" | wc -l)
          TOTAL_DAYS=30
          OVERALL_PCT=$(( (TOTAL_COMPLETED * 100) / TOTAL_DAYS ))
          if [ $OVERALL_PCT -gt 100 ]; then OVERALL_PCT=100; fi
          echo "overall=$OVERALL_PCT" >> $GITHUB_OUTPUT

          # 2. Weekly Progress Generator
          calc_week() {
            local week_num=$1
            local count=$(find . -path "./Week${week_num}/Day*/notes.md" | wc -l)
            local pct=$(( (count * 100) / 5 ))
            if [ $pct -gt 100 ]; then pct=100; fi
            
            local color="red"
            if [ $pct -eq 100 ]; then color="brightgreen"; elif [ $pct -gt 0 ]; then color="orange"; fi
            
            echo "{\"schemaVersion\": 1, \"label\": \"Week ${week_num}\", \"message\": \"${pct}%\", \"color\": \"${color}\"}" > progress-week${week_num}.json
          }

          calc_week 1
          calc_week 2
          calc_week 3
          calc_week 4
          calc_week 5
          calc_week 6

          # 3. Generate Main Progress JSON
          echo "{\"schemaVersion\": 1, \"label\": \"Course Progress\", \"message\": \"${OVERALL_PCT}%\", \"color\": \"blue\"}" > progress.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json progress-week*.json
          git diff --quiet && git diff --cached --quiet || (git commit -m "🤖 Auto-updated weekly progress badges" && git push origin master)